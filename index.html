<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary">
        <div class="container-fluid">
            <span class="navbar-brand fs-4">
                <i class="bi bi-cloud-sun-fill me-2"></i>Weather Dashboard
            </span>
            <button id="location-btn" class="btn btn-outline-light btn-sm">
                <i class="bi bi-geo-alt"></i> My Location
            </button>
        </div>
    </nav>

    <div class="container my-4">
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card mb-4">
                    <div class="card-body">
                        <h5 class="card-title">Search City</h5>
                        <div class="input-group">
                            <input type="text" id="city-input" class="form-control" placeholder="e.g. Dallas">
                            <button id="search-btn" class="btn btn-primary"><i class="bi bi-search"></i></button>
                        </div>
                    </div>
                </div>

                <h6 class="mb-2">Recent Searches</h6>
                <ul id="history-list" class="list-group"></ul>
            </div>

            <div class="col-md-8">
                <div id="current-weather" class="card mb-4"></div>

                <h5 class="mb-3 text-center">5-Day Forecast</h5>
                <div id="forecast-cards" class="row g-3"></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="errorModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title">Error</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modal-message"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
