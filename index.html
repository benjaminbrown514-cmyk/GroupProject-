<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="container my-4">
        <h1 class="text-center mb-4">Weather Dashboard</h1>
        
        <div class="row">
            <div class="col-lg-4 mb-4">
                <div id="search-form" class="mb-3">
                    <label for="city-input" class="form-label">Search for a city:</label>
                    <div class="input-group">
                        <input type="text" id="city-input" class="form-control" placeholder="Dallas">
                        <button id="search-btn" class="btn btn-primary">Search</button>
                        <button id="location-btn" class="btn btn-secondary">
                            <i class="bi bi-geo-alt"></i> My Location
                        </button>
                    </div>
                </div>
                <ul id="history-list" class="list-group"></ul>
            </div>
            
            <div class="col-lg-8">
                <div id="current-weather" class="card"></div>
            </div>
        </div>

        <div id="forecast" class="mt-5">
            <h2 class="mb-3">5-Day Forecast:</h2>
            <div id="forecast-cards" class="row g-3"></div>
        </div>
    </div>

    <div class="modal fade" id="errorModal" tabindex="-1" aria-labelledby="errorModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="errorModalLabel">Error</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p id="modal-message"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
